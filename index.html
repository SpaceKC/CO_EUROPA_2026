<style>
:root {
  --bg:#F5F0E8; --surface:#FFFFFF; --surface2:#F0EBE0; --surface3:#E8E0D0;
  --border:#D0C8B8; --border-light:#B8B0A0;
  --cream:#1A1610; --cream-dim:#4A4238;
  --amber:#D4820A; --amber-light:#F0A830; --amber-dim:#7A4A05;
  --terra:#C4622D; --terra-light:#E8834A;
  --sage:#5C8A5E; --sage-light:#7AAF7C;
  --blue:#3A6A9A; --blue-light:#5A8ABB;
  --danger:#C43030; --success:#3A8A3A;
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--cream);font-family:"DM Sans",sans-serif;min-height:100vh;font-size:15px}
#lockScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:32px}
.lock-glow{position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(212,130,10,0.15) 0%,transparent 70%);pointer-events:none}
.lock-icon{font-size:48px;margin-bottom:24px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05);opacity:0.8}}
.lock-title{font-family:"Playfair Display",serif;font-size:28px;color:var(--cream);margin-bottom:6px;text-align:center}
.lock-sub{font-size:13px;color:var(--cream-dim);margin-bottom:40px;text-align:center;letter-spacing:1px}
.lock-input{width:100%;max-width:320px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;color:var(--cream);font-size:18px;font-family:"DM Mono",monospace;letter-spacing:4px;text-align:center;outline:none;transition:border-color 0.2s}
.lock-input:focus{border-color:var(--amber)}
.lock-input.error{border-color:var(--danger);animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.lock-btn{width:100%;max-width:320px;margin-top:12px;padding:16px;background:var(--amber);color:#000;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s}
.lock-btn:active{transform:scale(0.98)}
.lock-error{color:var(--danger);font-size:13px;margin-top:10px;height:18px;text-align:center}
#app{display:none}
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,14,12,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.topbar-title{flex:1;font-family:"Playfair Display",serif;font-size:17px;color:var(--cream)}
.topbar-title span{font-style:italic;color:var(--amber-light)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:blink 0.5s infinite}
.sync-dot.offline{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.tbtn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--cream-dim);padding:8px 12px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif}
.hero{background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);padding:28px 20px 24px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 10% 50%,rgba(212,130,10,0.08) 0%,transparent 50%),radial-gradient(ellipse at 90% 20%,rgba(58,106,154,0.08) 0%,transparent 50%);pointer-events:none}
.hero-eye{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:8px}
.hero-title{font-family:"Playfair Display",serif;font-size:26px;line-height:1.2;margin-bottom:20px;color:var(--cream)}
.hero-title em{font-style:italic;color:var(--amber-light)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 8px;text-align:center}
.stat-num{font-family:"Playfair Display",serif;font-size:20px;color:var(--amber-light);display:block;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--cream-dim);letter-spacing:1px;text-transform:uppercase}
.route-scroll{display:flex;align-items:center;overflow-x:auto;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);scrollbar-width:none}
.route-scroll::-webkit-scrollbar{display:none}
.rc{font-family:"DM Mono",monospace;font-size:11px;color:var(--amber-light);white-space:nowrap;flex-shrink:0}
.ra{color:var(--border-light);margin:0 6px;font-size:12px;flex-shrink:0}
.conn-status{text-align:center;padding:6px;font-size:11px;font-family:"DM Mono",monospace;letter-spacing:1px}
.conn-status.online{color:var(--sage-light);background:rgba(92,138,94,0.1)}
.conn-status.offline{color:var(--terra-light);background:rgba(196,98,45,0.1)}
.sec-div{padding:24px 20px 12px;display:flex;align-items:center;gap:12px}
.sec-div-line{flex:1;height:1px;background:var(--border)}
.sec-div-text{font-family:"Playfair Display",serif;font-size:16px;color:var(--cream-dim);white-space:nowrap;font-style:italic}
.add-day-row{display:flex;align-items:center;gap:10px;margin:4px 12px;opacity:0.4;transition:opacity 0.2s}
.add-day-row:hover{opacity:1}
.add-day-line{flex:1;height:1px;background:var(--border)}
.add-day-btn{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px dashed var(--border-light);border-radius:20px;padding:6px 14px;color:var(--amber);font-size:11px;font-family:"DM Mono",monospace;letter-spacing:1px;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.add-day-btn:hover{background:var(--surface3);border-color:var(--amber)}
.day-card{margin:0 12px 4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.day-card.expanded{border-color:var(--border-light)}
.day-header{display:grid;grid-template-columns:56px 1fr auto;align-items:stretch;cursor:pointer;user-select:none;-webkit-user-select:none}
.day-num-col{background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 0}
.day-zi{font-family:"DM Mono",monospace;font-size:8px;letter-spacing:2px;color:var(--amber-dim);text-transform:uppercase}
.day-nr{font-family:"Playfair Display",serif;font-size:22px;color:var(--amber-light);line-height:1}
.day-info{padding:12px 14px;min-width:0}
.day-date{font-size:10px;font-family:"DM Mono",monospace;color:var(--cream-dim);letter-spacing:1px;margin-bottom:4px}
.day-route{font-family:"Playfair Display",serif;font-size:15px;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-route .arr{color:var(--terra);font-style:italic}
.day-right{padding:8px 14px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px}
.day-km{font-family:"DM Mono",monospace;font-size:11px;color:var(--cream-dim);background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:3px 7px}
.day-chevron{color:var(--cream-dim);font-size:14px;transition:transform 0.3s}
.day-card.expanded .day-chevron{transform:rotate(180deg)}
.weather-badge{display:flex;align-items:center;gap:4px;background:rgba(58,106,154,0.15);border:1px solid rgba(58,106,154,0.3);border-radius:12px;padding:3px 8px;font-size:11px;color:var(--blue-light);font-family:"DM Mono",monospace;white-space:nowrap}
.weather-badge.loading{color:var(--cream-dim);background:var(--surface3);border-color:var(--border)}
.weather-badge.warm{background:rgba(212,130,10,0.15);border-color:rgba(212,130,10,0.3);color:var(--amber-light)}
.weather-badge.hot{background:rgba(196,98,45,0.15);border-color:rgba(196,98,45,0.3);color:var(--terra-light)}
.day-body{display:none;border-top:1px solid var(--border)}
.day-card.expanded .day-body{display:block}
.weather-section{padding:14px 16px;border-bottom:1px solid var(--border);background:rgba(58,106,154,0.05)}
.weather-section-title{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--blue-light);margin-bottom:12px}
.weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.weather-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px}
.wc-label{font-size:10px;font-family:"DM Mono",monospace;color:var(--cream-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.wc-main{display:flex;align-items:center;gap:8px}
.wc-icon{font-size:28px}
.wc-temp{font-family:"Playfair Display",serif;font-size:26px;color:var(--cream);line-height:1}
.wc-desc{font-size:12px;color:var(--cream-dim);margin-top:4px}
.wc-details{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.wc-detail{font-size:10px;color:var(--cream-dim);font-family:"DM Mono",monospace;background:var(--surface3);border-radius:4px;padding:2px 6px}
.weather-loading{font-size:12px;color:var(--cream-dim);font-family:"DM Mono",monospace;text-align:center;padding:8px}
.weather-error{font-size:12px;color:var(--danger);font-family:"DM Mono",monospace;padding:8px}
.day-actions-bar{display:flex;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.dab-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;border:1px solid var(--border);background:var(--surface3);color:var(--cream-dim)}
.dab-btn.edit{color:var(--amber);border-color:var(--amber-dim)}
.dab-btn.del{color:var(--danger);border-color:rgba(196,48,48,0.3)}
.dab-btn.add-stop{color:var(--sage-light);border-color:rgba(92,138,94,0.3)}
.dab-btn.add-comment{color:var(--blue-light);border-color:rgba(58,106,154,0.3)}
.day-warning{background:rgba(196,98,45,0.1);border-left:3px solid var(--terra);padding:10px 16px;font-size:12px;color:var(--terra-light);line-height:1.5}
.stops-section{padding:16px;border-bottom:1px solid var(--border)}
.sec-lbl{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--cream-dim);margin-bottom:14px}
.stop-item{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.stop-item:last-child{margin-bottom:0}
.stop-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.dot-start{background:var(--surface3);border:1px solid var(--border-light)}
.dot-pause{background:rgba(92,138,94,0.2);border:1px solid var(--sage)}
.dot-visit{background:rgba(58,106,154,0.2);border:1px solid var(--blue)}
.dot-scenic{background:rgba(212,130,10,0.2);border:1px solid var(--amber)}
.dot-end{background:rgba(196,98,45,0.2);border:1px solid var(--terra)}
.stop-content{flex:1;min-width:0}
.stop-name{font-size:14px;font-weight:500;color:var(--cream);margin-bottom:3px}
.stop-desc{font-size:12px;color:var(--cream-dim);line-height:1.5}
.stop-link{display:inline-block;margin-top:5px;font-size:11px;color:var(--amber);text-decoration:none;font-family:"DM Mono",monospace}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:9px;letter-spacing:1px;font-family:"DM Mono",monospace;text-transform:uppercase;padding:2px 6px;border-radius:3px}
.tag-pause{background:rgba(92,138,94,0.15);color:var(--sage-light);border:1px solid rgba(92,138,94,0.3)}
.tag-vizita{background:rgba(58,106,154,0.15);color:var(--blue-light);border:1px solid rgba(58,106,154,0.3)}
.tag-panorama{background:rgba(212,130,10,0.15);color:var(--amber-light);border:1px solid rgba(212,130,10,0.3)}
.tag-pranz{background:rgba(196,98,45,0.15);color:var(--terra-light);border:1px solid rgba(196,98,45,0.3)}
.seb{font-size:10px;color:var(--cream-dim);background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:3px 8px;cursor:pointer;font-family:"DM Sans",sans-serif}
.seb.del{color:var(--danger)}
.accom-section{padding:14px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.accom-row{display:flex;align-items:center;gap:12px}
.accom-icon-box{font-size:22px;flex-shrink:0}
.accom-info-col{flex:1;min-width:0}
.accom-lbl{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:2px;color:var(--cream-dim);text-transform:uppercase;margin-bottom:3px}
.accom-name{font-family:"Playfair Display",serif;font-size:15px;color:var(--cream)}
.accom-nights-badge{flex-shrink:0;text-align:center}
.accom-n{font-family:"Playfair Display",serif;font-size:24px;color:var(--terra);display:block;line-height:1}
.accom-nl{font-size:9px;color:var(--cream-dim);letter-spacing:1px;text-transform:uppercase}
.accom-edit-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.accom-field{flex:1;min-width:140px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--cream);font-size:13px;font-family:"DM Sans",sans-serif;outline:none;transition:border-color 0.2s}
.accom-field:focus{border-color:var(--amber)}
.accom-field::placeholder{color:var(--cream-dim);opacity:0.5}
.accom-link-a{padding:8px 12px;background:var(--amber-dim);border:1px solid var(--amber);border-radius:6px;color:var(--amber-light);font-size:12px;cursor:pointer;white-space:nowrap;font-family:"DM Sans",sans-serif;text-decoration:none;display:flex;align-items:center;gap:4px}
.notes-section{padding:14px 16px}
.notes-textarea{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--cream);font-size:13px;font-family:"DM Sans",sans-serif;line-height:1.5;resize:none;outline:none;min-height:70px;transition:border-color 0.2s}
.notes-textarea:focus{border-color:var(--amber)}
.notes-textarea::placeholder{color:var(--cream-dim);opacity:0.4}
.notes-actions{display:flex;justify-content:flex-end;margin-top:8px}
.save-btn{padding:8px 18px;background:var(--amber);color:#000;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif}
.save-btn.saved{background:var(--success);color:#fff}
.stay-days{padding:14px 16px;border-bottom:1px solid var(--border)}
.stay-day{margin-bottom:14px}
.stay-day:last-child{margin-bottom:0}
.stay-day-title{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:6px}
.stay-day-items{list-style:none}
.stay-day-items li{font-size:13px;color:var(--cream-dim);padding:3px 0 3px 14px;position:relative;line-height:1.5}
.stay-day-items li::before{content:"·";position:absolute;left:0;color:var(--terra);font-size:18px;line-height:1.1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border-light);border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:24px 20px 40px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);max-height:85vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border-light);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:"Playfair Display",serif;font-size:18px;color:var(--cream);margin-bottom:18px}
.mfg{margin-bottom:14px}
.mlbl{font-size:11px;font-family:"DM Mono",monospace;letter-spacing:1px;color:var(--cream-dim);text-transform:uppercase;margin-bottom:6px;display:block}
.minput,.mtextarea,.mselect{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:11px 14px;color:var(--cream);font-size:14px;font-family:"DM Sans",sans-serif;outline:none;transition:border-color 0.2s}
.minput:focus,.mtextarea:focus,.mselect:focus{border-color:var(--amber)}
.minput::placeholder,.mtextarea::placeholder{color:var(--cream-dim);opacity:0.4}
.mselect{appearance:none;cursor:pointer}
.mtextarea{resize:none;min-height:80px;line-height:1.5}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.mcancel{padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--cream-dim);font-size:14px;cursor:pointer;font-family:"DM Sans",sans-serif}
.mconfirm{padding:13px;background:var(--amber);border:none;border-radius:6px;color:#000;font-size:14px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif}
.km-status{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;font-family:"DM Mono",monospace;display:none}
.km-status.loading{background:rgba(212,130,10,0.1);border:1px solid var(--amber-dim);color:var(--amber-light);display:block}
.km-status.done{background:rgba(92,138,94,0.1);border:1px solid var(--sage);color:var(--sage-light);display:block}
.km-status.error{background:rgba(196,48,48,0.1);border:1px solid var(--danger);color:#ff6b6b;display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border-light);border-radius:24px;padding:10px 20px;font-size:13px;color:var(--cream);z-index:9999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--sage);color:var(--sage-light)}
.toast.error{border-color:var(--danger);color:#ff6b6b}
.comment-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.comment-author{font-size:11px;color:var(--amber);font-family:"DM Mono",monospace;margin-bottom:4px}
.comment-text{font-size:13px;color:var(--cream-dim);line-height:1.5}
@media(min-width:600px){
  .day-card,.add-day-row{margin-left:20px;margin-right:20px}
  .hero{padding:36px 24px 28px}
  .hero-title{font-size:32px}
}
</style>
</head>
<body><div id="lockScreen">
  <div class="lock-glow"></div>
  <div class="lock-icon">🗺️</div>
  <h1 class="lock-title">Europa 2026</h1>
  <p class="lock-sub">ACCES PRIVAT · GRUPUL NOSTRU</p>
  <input type="password" class="lock-input" id="pwInput" placeholder="••••••••" maxlength="20" autocomplete="off">
  <button class="lock-btn" onclick="checkPassword()">INTRĂ</button>
  <p class="lock-error" id="lockError"></p>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-title">Europa <span>2026</span></div>
    <div class="sync-dot" id="syncDot"></div>
    <button class="tbtn" onclick="showAbout()">ℹ️</button>
    <button class="tbtn" onclick="logout()">Ieși</button>
  </div>
  <div id="connStatus" class="conn-status online">● Conectat · sincronizare activă</div>
  <div class="hero">
    <div class="hero-eye">Itinerar · Iulie 2026</div>

let DAYS=[],fbData={},isConnected=false,modalCb=null,toastTimer;
const weatherCache={};

function checkPassword(){
  const v=document.getElementById("pwInput").value;
  if(v===PASSWORD){
    sessionStorage.setItem("auth_e2026","1");
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("app").style.display="block";
    initApp();
  } else {
    const i=document.getElementById("pwInput");
    i.classList.add("error");
    document.getElementById("lockError").textContent="Parolă incorectă.";
    setTimeout(()=>i.classList.remove("error"),500);
    i.value="";i.focus();
  }
}
function logout(){sessionStorage.removeItem("auth_e2026");location.reload();}
document.getElementById("pwInput").addEventListener("keydown",e=>{if(e.key==="Enter")checkPassword();document.getElementById("lockError").textContent="";});

function initApp(){
  document.addEventListener("firebaseReady",()=>initFb(),{once:true});
  if(window._firebaseReady)initFb();
  else setTimeout(()=>{if(!window._firebaseReady){DAYS=JSON.parse(JSON.stringify(DEFAULT_DAYS));renderAll();setSyncStatus("offline");}},3000);
}
function initFb(){
  try{
    const tripRef=window._dbRef(window._db,"trip2026");
    window._dbOnValue(tripRef,(snap)=>{
      fbData=snap.val()||{};isConnected=true;setSyncStatus("online");
     DAYS=(fbData._days&&fbData._days.length>0)?fbData._days:JSON.parse(JSON.stringify(DEFAULT_DAYS));
      renderAll();
      Object.keys(weatherCache).forEach(k=>delete weatherCache[k]); 
    },(err)=>{DAYS=JSON.parse(JSON.stringify(DEFAULT_DAYS));renderAll();setSyncStatus("offline");});
  }catch(e){DAYS=JSON.parse(JSON.stringify(DEFAULT_DAYS));renderAll();setSyncStatus("offline");}
}
async function saveDays(){
  if(!window._firebaseReady||!isConnected)return;
  try{setSyncStatus("syncing");await window._dbSet(window._dbRef(window._db,"trip2026/_days"),DAYS);setSyncStatus("online");}
  catch(e){setSyncStatus("online");}
}
async function saveFbPath(path,data){
  if(!window._firebaseReady||!isConnected)return false;
  try{setSyncStatus("syncing");await window._dbSet(window._dbRef(window._db,`trip2026/${path}`),data);setSyncStatus("online");return true;}
  catch(e){setSyncStatus("online");showToast("Eroare salvare","error");return false;}
}
function setSyncStatus(s){
  const dot=document.getElementById("syncDot"),bar=document.getElementById("connStatus");
  dot.className="sync-dot"+(s==="syncing"?" syncing":s==="offline"?" offline":"");
  if(s==="online"){bar.className="conn-status online";bar.textContent="● Conectat · sincronizare activă";}
  else if(s==="offline"){bar.className="conn-status offline";bar.textContent="● Offline · fără sincronizare";}
  else{bar.className="conn-status online";bar.textContent="● Sincronizare...";}
}

const weatherIcons={"01d":"☀️","01n":"🌙","02d":"⛅","02n":"⛅","03d":"☁️","03n":"☁️","04d":"☁️","04n":"☁️","09d":"🌧️","09n":"🌧️","10d":"🌦️","10n":"🌦️","11d":"⛈️","11n":"⛈️","13d":"❄️","13n":"❄️","50d":"🌫️","50n":"🌫️"};
const weatherDesc={"clear sky":"Cer senin","few clouds":"Puțini nori","scattered clouds":"Nori împrăștiați","broken clouds":"Înnorat parțial","overcast clouds":"Înnorat","light rain":"Ploaie ușoară","moderate rain":"Ploaie moderată","heavy rain":"Ploaie puternică","thunderstorm":"Furtună","snow":"Ninsoare","mist":"Ceață","fog":"Ceață deasă","drizzle":"Burniță"};
function translateDesc(d){const l=d.toLowerCase();for(const[en,ro]of Object.entries(weatherDesc)){if(l.includes(en))return ro;}return d;}
function getTempClass(t){if(t>=30)return"hot";if(t>=22)return"warm";return"";}

async function fetchWeatherCurrent(city){
  if(!WEATHER_API_KEY||WEATHER_API_KEY==="OPENWEATHER_API_KEY")return null;
  const key="curr_"+city;
  if(weatherCache[key])return weatherCache[key];
  try{
    const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${WEATHER_API_KEY}&units=metric&lang=ro`);
    if(!res.ok)return null;
    const d=await res.json();
    const result={temp:Math.round(d.main.temp),feels:Math.round(d.main.feels_like),min:Math.round(d.main.temp_min),max:Math.round(d.main.temp_max),humidity:d.main.humidity,wind:Math.round(d.wind.speed*3.6),desc:translateDesc(d.weather[0].description),icon:weatherIcons[d.weather[0].icon]||"🌡️",type:"current"};
    weatherCache[key]=result;return result;
  }catch(e){return null;}
}

async function fetchWeatherForecast(city,dateStr){
  if(!WEATHER_API_KEY||WEATHER_API_KEY==="OPENWEATHER_API_KEY")return null;
  const months={"Ianuarie":0,"Februarie":1,"Martie":2,"Aprilie":3,"Mai":4,"Iunie":5,"Iulie":6,"August":7,"Septembrie":8,"Octombrie":9,"Noiembrie":10,"Decembrie":11};
  const parts=dateStr.split(" ");
  if(parts.length<2)return null;
  const day=parseInt(parts[0]),month=months[parts[1]];
  if(isNaN(day)||month===undefined)return null;
  const key="fore_"+city+"_"+dateStr;
  if(weatherCache[key])return weatherCache[key];
  try{
    const res=await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${WEATHER_API_KEY}&units=metric&lang=ro&cnt=40`);
    if(!res.ok)return null;
    const d=await res.json();
    const target=d.list.filter(item=>{const dt=new Date(item.dt*1000);return dt.getMonth()===month&&dt.getDate()===day;});
    if(!target||target.length===0)return null;
    const noon=target.find(t=>{const h=new Date(t.dt*1000).getHours();return h>=11&&h<=14;})||target[0];
    const temps=target.map(t=>t.main.temp);
    const result={temp:Math.round(noon.main.temp),min:Math.round(Math.min(...temps)),max:Math.round(Math.max(...temps)),humidity:noon.main.humidity,wind:Math.round(noon.wind.speed*3.6),desc:translateDesc(noon.weather[0].description),icon:weatherIcons[noon.weather[0].icon]||"🌡️",type:"forecast"};
    weatherCache[key]=result;return result;
  }catch(e){return null;}
}

async function loadWeatherForDay(day){
  const city=day.to&&day.to!=="—"?day.to:day.from;
  if(!city||city==="—")return;
  const[current,forecast]=await Promise.all([fetchWeatherCurrent(city),fetchWeatherForecast(city,day.date)]);
  const wsEl=document.getElementById("ws_"+day.id);
  if(!wsEl)return;
  if(!current&&!forecast){
    wsEl.innerHTML=`<div class="weather-section-title">🌡️ Meteo · ${city}</div><div class="weather-error">⚠️ Verifică cheia OpenWeatherMap (PASUL 2 din fișier)</div>`;
    return;
  }
  let html=`<div class="weather-section-title">🌡️ Meteo · ${city}</div><div class="weather-grid">`;
  if(current){
    html+=`<div class="weather-card"><div class="wc-label">Acum · Curent</div><div class="wc-main"><span class="wc-icon">${current.icon}</span><span class="wc-temp">${current.temp}°C</span></div><div class="wc-desc">${current.desc}</div><div class="wc-details"><span class="wc-detail">↑${current.max}° ↓${current.min}°</span><span class="wc-detail">💧${current.humidity}%</span><span class="wc-detail">💨${current.wind}km/h</span></div></div>`;
  }
  if(forecast){
    html+=`<div class="weather-card"><div class="wc-label">Prognoză · ${day.date}</div><div class="wc-main"><span class="wc-icon">${forecast.icon}</span><span class="wc-temp">${forecast.temp}°C</span></div><div class="wc-desc">${forecast.desc}</div><div class="wc-details"><span class="wc-detail">↑${forecast.max}° ↓${forecast.min}°</span><span class="wc-detail">💧${forecast.humidity}%</span><span class="wc-detail">💨${forecast.wind}km/h</span></div></div>`;
  }else if(current){
    html+=`<div class="weather-card" style="opacity:0.5"><div class="wc-label">Prognoză · ${day.date}</div><div class="wc-desc" style="margin-top:12px;font-size:11px">Prognoza pentru această dată nu este disponibilă încă.<br>(Max. 16 zile în avans)</div></div>`;
  }
  html+=`</div>`;
  wsEl.innerHTML=html;
  const wbEl=document.getElementById("wb_"+day.id);
  if(wbEl&&current){wbEl.className="weather-badge "+getTempClass(current.temp);wbEl.textContent=`${current.icon} ${current.temp}°C`;}
}function renderAll(){renderRoute();renderDays();updateStats();}

function renderRoute(){
  const c=document.getElementById("routeScroll");c.innerHTML="";
  const cities=[];
  DAYS.forEach(d=>{if(d.from&&!cities.includes(d.from))cities.push(d.from);});
  const last=DAYS[DAYS.length-1];
  if(last&&last.to&&last.to!=="—"&&!cities.includes(last.to))cities.push(last.to);
  cities.forEach((city,i)=>{
    const s=document.createElement("span");s.className="rc";s.textContent=city;c.appendChild(s);
    if(i<cities.length-1){const a=document.createElement("span");a.className="ra";a.textContent="→";c.appendChild(a);}
  });
}

function updateStats(){
  const totalKm=DAYS.reduce((s,d)=>s+(d.km||0),0);
  const cazari=DAYS.filter(d=>d.accom&&d.accom.nights).length;
  document.getElementById("statZile").textContent=DAYS.length;
  document.getElementById("statKm").textContent=totalKm>999?"~"+Math.round(totalKm/100)/10+"k":"~"+totalKm;
  document.getElementById("statCazari").textContent=cazari;
}

function renderDays(){
  const c=document.getElementById("daysContainer");c.innerHTML="";
  let lastSection=null;
  DAYS.forEach((day,idx)=>{
    if(day.section&&day.section!==lastSection){
      const div=document.createElement("div");div.className="sec-div";
      div.innerHTML=`<div class="sec-div-line"></div><div class="sec-div-text">${day.section}</div><div class="sec-div-line"></div>`;
      c.appendChild(div);lastSection=day.section;
    }
    c.appendChild(buildAddDayBtn(idx));
    c.appendChild(buildDayCard(day,idx));
  });
  c.appendChild(buildAddDayBtn(DAYS.length));
}

function buildAddDayBtn(idx){
  const row=document.createElement("div");row.className="add-day-row";
  row.innerHTML=`<div class="add-day-line"></div><button class="add-day-btn" onclick="showAddDay(${idx})">＋ Adaugă zi / deviere</button><div class="add-day-line"></div>`;
  return row;
}

function buildDayCard(day,idx){
  const saved=fbData[day.id]||{};
  const card=document.createElement("div");
  card.className="day-card";card.id="card_"+day.id;
  const city=day.to&&day.to!=="—"?day.to:day.from;
  const routeHtml=day.to&&day.to!=="—"?`${day.from} <span class="arr">→</span> ${day.to}`:`${day.from} <span class="arr">—</span> Zi liberă`;
  card.innerHTML=`
    <div class="day-header" onclick="toggleCard('${day.id}')">
      <div class="day-num-col"><span class="day-zi">Ziua</span><span class="day-nr">${day.num}</span></div>
      <div class="day-info"><div class="day-date">${day.date}</div><div class="day-route">${routeHtml}</div></div>
      <div class="day-right">
        <span class="day-km">${day.km>0?"~"+day.km+" km":"Zi liberă"}</span>
        <span class="weather-badge loading" id="wb_${day.id}">⏳ meteo</span>
        <span class="day-chevron">▼</span>
      </div>
    </div>
    <div class="day-body" id="body_${day.id}">
      ${day.warning?`<div class="day-warning">${day.warning}</div>`:""}
      <div class="day-actions-bar">
        <button class="dab-btn edit" onclick="editDay('${day.id}')">✏️ Editează ziua</button>
        <button class="dab-btn add-stop" onclick="addStop('${day.id}')">＋ Oprire</button>
        <button class="dab-btn add-comment" onclick="addComment('${day.id}')">💬 Comentariu</button>
        <button class="dab-btn del" onclick="confirmDeleteDay('${day.id}')">🗑️ Șterge ziua</button>
      </div>
      <div class="weather-section" id="ws_${day.id}">
        <div class="weather-section-title">🌡️ Meteo · ${city}</div>
        <div class="weather-loading">⏳ Se încarcă prognoza meteo...</div>
      </div>
      ${buildStopsHtml(day,saved)}
      ${buildStayDaysHtml(day)}
      ${buildAccomHtml(day,saved)}
      ${buildNotesHtml(day,saved)}
    </div>`;
  card.querySelector(".day-header").addEventListener("click",()=>{
    setTimeout(()=>{if(card.classList.contains("expanded"))loadWeatherForDay(day);},150);
  });
  return card;
}

function buildStopsHtml(day,saved){
  const stops=getStops(day,saved);
  if(!stops||stops.length===0)return"";
  return`<div class="stops-section"><div class="sec-lbl">Opriri & Program</div>${stops.filter(s=>!s.deleted).map((s,i)=>`
    <div class="stop-item">
      <div class="stop-dot dot-${s.type||"pause"}">${s.icon||"📍"}</div>
      <div class="stop-content">
        <div class="stop-name">${s.name}</div>
        <div class="stop-desc">${s.desc}</div>
        ${s.link?`<a href="${s.link}" target="_blank" class="stop-link">🔗 Google Maps</a>`:""}
        ${s.tags&&s.tags.length?`<div class="tags">${s.tags.map(t=>`<span class="tag tag-${tagClass(t)}">${t}</span>`).join("")}</div>`:""}
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="seb" onclick="editStop('${day.id}',${i})">✏️ Editează</button>
          <button class="seb del" onclick="deleteStop('${day.id}',${i})">🗑️ Șterge</button>
        </div>
      </div>
    </div>`).join("")}</div>`;
}

function getStops(day,saved){
  let stops=day.stops?JSON.parse(JSON.stringify(day.stops)):[];
  if(saved.stops){
    if(saved.stops.edits)Object.keys(saved.stops.edits).forEach(i=>{if(stops[parseInt(i)])stops[parseInt(i)]={...stops[parseInt(i)],...saved.stops.edits[i]};});
    if(saved.stops.custom)stops=[...stops,...saved.stops.custom];
  }
  return stops;
}

function buildStayDaysHtml(day){
  if(!day.stayDays)return"";
  return`<div class="stay-days">${day.stayDays.map(sd=>`<div class="stay-day"><div class="stay-day-title">${sd.title}</div><ul class="stay-day-items">${sd.items.map(it=>`<li>${it}</li>`).join("")}</ul></div>`).join("")}</div>`;
}

function buildAccomHtml(day,saved){
  if(!day.accom)return"";
  const a=day.accom,hn=saved.hotel_name||"",ha=saved.hotel_addr||"",hl=saved.hotel_link||"";
  return`<div class="accom-section">
    <div class="accom-row">
      <div class="accom-icon-box">${a.icon}</div>
      <div class="accom-info-col"><div class="accom-lbl">${a.note||"Cazare"}</div><div class="accom-name">${hn||a.city}</div>${ha?`<div style="font-size:12px;color:var(--cream-dim);margin-top:2px">📍 ${ha}</div>`:""}</div>
      ${a.nights?`<div class="accom-nights-badge"><span class="accom-n">${a.nights}</span><span class="accom-nl">nopți</span></div>`:""}
    </div>
    <div class="accom-edit-row">
      <input class="accom-field" placeholder="Nume hotel..." value="${hn}" id="acf_n_${day.id}" onchange="saveAccom('${day.id}')">
      <input class="accom-field" placeholder="Adresă..." value="${ha}" id="acf_a_${day.id}" onchange="saveAccom('${day.id}')">
    </div>
    <div class="accom-edit-row" style="margin-top:8px">
      <input class="accom-field" placeholder="Link Booking / rezervare..." value="${hl}" id="acf_l_${day.id}" onchange="saveAccom('${day.id}')">
      ${hl?`<a href="${hl}" target="_blank" class="accom-link-a">🔗 Deschide</a>`:""}
    </div>
  </div>`;
}

function buildNotesHtml(day,saved){
  const notes=saved.notes||"",comments=saved.comments||[];
  return`<div class="notes-section">
    <div class="sec-lbl" style="margin-bottom:10px">Note & Comentarii</div>
    <textarea class="notes-textarea" id="notes_${day.id}" placeholder="Note, link-uri, observații...">${notes}</textarea>
    <div class="notes-actions"><button class="save-btn" id="sb_${day.id}" onclick="saveNotes('${day.id}')">Salvează</button></div>
    ${comments.length?`<div style="margin-top:12px">${comments.map((c,i)=>`<div class="comment-card"><div class="comment-author">${c.author} · ${c.time}</div><div class="comment-text">${c.text}</div><button class="seb del" style="margin-top:6px" onclick="deleteComment('${day.id}',${i})">🗑️</button></div>`).join("")}</div>`:""}
  </div>`;
}

function toggleCard(id){document.getElementById("card_"+id)?.classList.toggle("expanded");}

function editDay(dayId){
  const day=DAYS.find(d=>d.id===dayId);if(!day)return;
  showModal("✏️ Editează ziua",`
    <div class="mfg"><label class="mlbl">Data (ex: 09 Iulie)</label><input class="minput" id="m_date" value="${day.date}"></div>
    <div class="mfg"><label class="mlbl">Localitate De La</label><input class="minput" id="m_from" value="${day.from}"></div>
    <div class="mfg"><label class="mlbl">Localitate Până La (— pentru zi liberă)</label><input class="minput" id="m_to" value="${day.to||""}"></div>
    <div class="mfg"><label class="mlbl">Km — lasă gol pentru calcul automat</label>
      <input class="minput" id="m_km" value="${day.km||""}" placeholder="ex: 450 sau gol = calcul automat">
      <div id="kmStatus" class="km-status"></div>
    </div>
    <div class="mfg"><label class="mlbl">Ore (ex: 08:00→18:00)</label><input class="minput" id="m_time" value="${day.time||""}"></div>
    <div class="mfg"><label class="mlbl">Avertizare (opțional)</label><input class="minput" id="m_warn" value="${day.warning||""}" placeholder="ex: ⚠️ Zi lungă..."></div>
  `,async()=>{
    const from=document.getElementById("m_from").value.trim(),to=document.getElementById("m_to").value.trim();
    let km=parseInt(document.getElementById("m_km").value)||0;
    if(!km&&from&&to&&to!=="—")km=await calcKm(from,to)||0;
    day.date=document.getElementById("m_date").value.trim();
    day.from=from;day.to=to;day.km=km;
    day.time=document.getElementById("m_time").value.trim();
    day.warning=document.getElementById("m_warn").value.trim()||null;
    await saveDays();showToast("Ziua actualizată! ✓","success");renderAll();
  });
}

function showAddDay(insertIdx){
  const prevDay=insertIdx>0?DAYS[insertIdx-1]:null;
  const nextDay=insertIdx<DAYS.length?DAYS[insertIdx]:null;
  const defFrom=prevDay?(prevDay.to&&prevDay.to!=="—"?prevDay.to:prevDay.from):"";
  const defTo=nextDay?nextDay.from:"";
  showModal("➕ Adaugă zi nouă",`
    <div class="mfg"><label class="mlbl">Tip</label>
      <select class="mselect" id="m_type" onchange="toggleDayType()">
        <option value="drive">🚗 Zi de drum (cu destinație nouă)</option>
        <option value="free">🏖️ Zi liberă (stai în același loc)</option>
      </select>
    </div>
    <div class="mfg"><label class="mlbl">Data (ex: 16 Iulie)</label><input class="minput" id="m_date" placeholder="ex: 16 Iulie"></div>
    <div id="drive_fields">
      <div class="mfg"><label class="mlbl">De La</label><input class="minput" id="m_from" value="${defFrom}"></div>
      <div class="mfg"><label class="mlbl">Până La (destinație nouă)</label>
        <input class="minput" id="m_to" value="${defTo}">
        <button onclick="triggerCalcKm()" style="margin-top:8px;padding:8px 14px;background:var(--amber-dim);border:1px solid var(--amber);border-radius:6px;color:var(--amber-light);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%">🔄 Calculează km automat (OpenStreetMap)</button>
        <div id="kmStatus" class="km-status"></div>
      </div>
      <div class="mfg"><label class="mlbl">Km (completat automat sau manual)</label><input class="minput" id="m_km" placeholder="ex: 280"></div>
      <div class="mfg"><label class="mlbl">Ore</label><input class="minput" id="m_time" placeholder="ex: 08:00→15:00"></div>
    </div>
    <div id="free_fields" style="display:none">
      <div class="mfg"><label class="mlbl">Localitate (unde stați)</label><input class="minput" id="m_free_city" value="${defFrom}"></div>
    </div>
    <div class="mfg"><label class="mlbl">Cazare (opțional)</label><input class="minput" id="m_accom" placeholder="ex: Hotel Florența, Italia"></div>
    <div class="mfg"><label class="mlbl">Număr nopți</label><input class="minput" id="m_nights" type="number" min="0" max="14" value="1"></div>
  `,async()=>{
    const type=document.getElementById("m_type").value,date=document.getElementById("m_date").value.trim();
    let from,to,km,time;
    if(type==="drive"){
      from=document.getElementById("m_from").value.trim();to=document.getElementById("m_to").value.trim();
      km=parseInt(document.getElementById("m_km").value)||0;time=document.getElementById("m_time").value.trim();
      if(!km&&from&&to)km=await calcKm(from,to)||0;
    }else{from=document.getElementById("m_free_city").value.trim();to="—";km=0;time="Zi liberă";}
    const accomCity=document.getElementById("m_accom").value.trim();
    const nights=parseInt(document.getElementById("m_nights").value)||1;
    const newDay={id:"custom_"+Date.now(),num:String(insertIdx+1),date,from,to,km,time,
      stops:[{icon:"📍",type:"start",name:`Plecare din ${from}`,desc:"",tags:[]}],
      accom:accomCity?{city:accomCity,nights,icon:"🏨"}:null};
    DAYS.splice(insertIdx,0,newDay);renumberDays();
    await saveDays();showToast("Zi nouă adăugată! ✓","success");renderAll();
  });
}

function toggleDayType(){
  const t=document.getElementById("m_type").value;
  document.getElementById("drive_fields").style.display=t==="drive"?"block":"none";
  document.getElementById("free_fields").style.display=t==="free"?"block":"none";
}

async function triggerCalcKm(){
  const from=document.getElementById("m_from")?.value?.trim(),to=document.getElementById("m_to")?.value?.trim();
  if(!from||!to){showToast("Completează De La și Până La!","error");return;}
  const km=await calcKm(from,to);if(km)document.getElementById("m_km").value=km;
}

function confirmDeleteDay(dayId){
  const day=DAYS.find(d=>d.id===dayId);if(!day)return;
  showModal("🗑️ Șterge ziua",`<p style="font-size:14px;color:var(--cream-dim);line-height:1.6">Ești sigur că vrei să ștergi<br><strong style="color:var(--cream)">${day.date} — ${day.from}${day.to&&day.to!=="—"?" → "+day.to:""}</strong>?<br><br>Acțiunea nu poate fi anulată.</p>`,
  async()=>{
    const idx=DAYS.findIndex(d=>d.id===dayId);DAYS.splice(idx,1);renumberDays();
    await saveDays();showToast("Ziua ștearsă","success");renderAll();
  });
  document.getElementById("mconfirmBtn").textContent="Șterge";
  document.getElementById("mconfirmBtn").style.background="var(--danger)";
  document.getElementById("mconfirmBtn").style.color="#fff";
}

function renumberDays(){DAYS.forEach((d,i)=>d.num=String(i+1));}

function addStop(dayId){
  showModal("➕ Adaugă oprire",`
    <div class="mfg"><label class="mlbl">Tip</label>
      <select class="mselect" id="m_type">
        <option value="pause">🟢 Pauză / Masă</option>
        <option value="visit">🔵 Vizită</option>
        <option value="scenic">🟡 Panoramă</option>
        <option value="end">🟠 Destinație</option>
      </select>
    </div>
    <div class="mfg"><label class="mlbl">Emoji + Nume</label><input class="minput" id="m_name" placeholder="ex: 🍕 Florența — prânz rapid"></div>
    <div class="mfg"><label class="mlbl">Descriere</label><textarea class="mtextarea" id="m_desc" placeholder="Detalii, ore..."></textarea></div>
    <div class="mfg"><label class="mlbl">Link Google Maps (opțional)</label><input class="minput" id="m_link" placeholder="https://maps.google.com/..."></div>
  `,async()=>{
    const stop={type:document.getElementById("m_type").value,icon:document.getElementById("m_name").value.match(/^\p{Emoji}/u)?.[0]||"📍",name:document.getElementById("m_name").value,desc:document.getElementById("m_desc").value,tags:[],link:document.getElementById("m_link").value,custom:true};
    if(!fbData[dayId])fbData[dayId]={};if(!fbData[dayId].stops)fbData[dayId].stops={};if(!fbData[dayId].stops.custom)fbData[dayId].stops.custom=[];
    fbData[dayId].stops.custom.push(stop);
    await saveFbPath(`${dayId}/stops/custom`,fbData[dayId].stops.custom);
    showToast("Oprire adăugată! ✓","success");refreshCard(dayId);
  });
}

function editStop(dayId,idx){
  const day=DAYS.find(d=>d.id===dayId),saved=fbData[dayId]||{},stops=getStops(day,saved),s=stops[idx];
  showModal("✏️ Editează oprire",`
    <div class="mfg"><label class="mlbl">Nume</label><input class="minput" id="m_name" value="${s.name}"></div>
    <div class="mfg"><label class="mlbl">Descriere</label><textarea class="mtextarea" id="m_desc">${s.desc}</textarea></div>
    <div class="mfg"><label class="mlbl">Link Google Maps</label><input class="minput" id="m_link" value="${s.link||""}"></div>
  `,async()=>{
    if(!fbData[dayId])fbData[dayId]={};if(!fbData[dayId].stops)fbData[dayId].stops={};if(!fbData[dayId].stops.edits)fbData[dayId].stops.edits={};
    fbData[dayId].stops.edits[idx]={name:document.getElementById("m_name").value,desc:document.getElementById("m_desc").value,link:document.getElementById("m_link").value};
    await saveFbPath(`${dayId}/stops/edits/${idx}`,fbData[dayId].stops.edits[idx]);
    showToast("Oprire actualizată! ✓","success");refreshCard(dayId);
  });
}

function deleteStop(dayId,idx){
  showModal("🗑️ Șterge oprirea",`<p style="font-size:14px;color:var(--cream-dim)">Ești sigur că vrei să ștergi această oprire?</p>`,async()=>{
    const day=DAYS.find(d=>d.id===dayId),defaultLen=day.stops?day.stops.length:0;
    if(idx>=defaultLen){
      if(fbData[dayId]?.stops?.custom){fbData[dayId].stops.custom.splice(idx-defaultLen,1);await saveFbPath(`${dayId}/stops/custom`,fbData[dayId].stops.custom);}
    }else{
      if(!fbData[dayId])fbData[dayId]={};if(!fbData[dayId].stops)fbData[dayId].stops={};if(!fbData[dayId].stops.edits)fbData[dayId].stops.edits={};
      fbData[dayId].stops.edits[idx]={...fbData[dayId].stops.edits[idx]||{},deleted:true};
      await saveFbPath(`${dayId}/stops/edits/${idx}`,fbData[dayId].stops.edits[idx]);
    }
    showToast("Oprire ștearsă","success");refreshCard(dayId);
  });
  document.getElementById("mconfirmBtn").textContent="Șterge";
  document.getElementById("mconfirmBtn").style.background="var(--danger)";
  document.getElementById("mconfirmBtn").style.color="#fff";
}

async function saveNotes(dayId){
  const notes=document.getElementById("notes_"+dayId)?.value||"",btn=document.getElementById("sb_"+dayId);
  if(!fbData[dayId])fbData[dayId]={};fbData[dayId].notes=notes;
  const ok=await saveFbPath(`${dayId}/notes`,notes);
  if(ok!==false){btn.textContent="✓ Salvat";btn.classList.add("saved");setTimeout(()=>{btn.textContent="Salvează";btn.classList.remove("saved");},2000);showToast("Note salvate! ✓","success");}
}

async function saveAccom(dayId){
  const n=document.getElementById(`acf_n_${dayId}`)?.value||"",a=document.getElementById(`acf_a_${dayId}`)?.value||"",l=document.getElementById(`acf_l_${dayId}`)?.value||"";
  if(!fbData[dayId])fbData[dayId]={};Object.assign(fbData[dayId],{hotel_name:n,hotel_addr:a,hotel_link:l});
  await saveFbPath(dayId,fbData[dayId]);showToast("Cazare salvată! 🏨","success");refreshCard(dayId);
}

function addComment(dayId){
  showModal("💬 Adaugă comentariu",`
    <div class="mfg"><label class="mlbl">Numele tău</label><input class="minput" id="m_author" value="${localStorage.getItem("e_name")||""}" placeholder="ex: Andrei"></div>
    <div class="mfg"><label class="mlbl">Comentariu</label><textarea class="mtextarea" id="m_comment" placeholder="Idee, întrebare, sugestie..."></textarea></div>
  `,async()=>{
    const author=document.getElementById("m_author").value||"Anonim",text=document.getElementById("m_comment").value;
    if(!text.trim())return;
    localStorage.setItem("e_name",author);
    const comment={author,text,time:new Date().toLocaleDateString("ro-RO",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})};
    if(!fbData[dayId])fbData[dayId]={};if(!fbData[dayId].comments)fbData[dayId].comments=[];
    fbData[dayId].comments.push(comment);
    await saveFbPath(`${dayId}/comments`,fbData[dayId].comments);
    showToast("Comentariu adăugat! 💬","success");refreshCard(dayId);
  });
}

async function deleteComment(dayId,idx){
  if(!fbData[dayId]?.comments)return;
  fbData[dayId].comments.splice(idx,1);
  await saveFbPath(`${dayId}/comments`,fbData[dayId].comments);
  showToast("Comentariu șters","success");refreshCard(dayId);
}

async function calcKm(from,to){
  const ks=document.getElementById("kmStatus");
  if(ks){ks.className="km-status loading";ks.textContent="⏳ Calculez distanța via OpenStreetMap...";}
  try{
    const[cf,ct]=await Promise.all([geocode(from),geocode(to)]);
    if(!cf||!ct){if(ks){ks.className="km-status error";ks.textContent="❌ Nu am găsit una din localități.";}return null;}
    const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${cf.lon},${cf.lat};${ct.lon},${ct.lat}?overview=false`);
    const d=await res.json();
    if(d.code!=="Ok"||!d.routes?.[0]){if(ks){ks.className="km-status error";ks.textContent="❌ Nu am putut calcula ruta.";}return null;}
    const km=Math.round(d.routes[0].distance/1000);
    if(ks){ks.className="km-status done";ks.textContent=`✅ ~${km} km pe șosea (OpenStreetMap)`;}
    return km;
  }catch(e){if(ks){ks.className="km-status error";ks.textContent="❌ Eroare de rețea. Introdu km manual.";}return null;}
}

async function geocode(city){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`,{headers:{"Accept-Language":"ro,en"}});
    const d=await res.json();if(!d||d.length===0)return null;
    return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon)};
  }catch(e){return null;}
}

function refreshCard(dayId){
  const day=DAYS.find(d=>d.id===dayId),card=document.getElementById("card_"+dayId);
  if(!card||!day)return;
  const wasExp=card.classList.contains("expanded");
  const nc=buildDayCard(day,DAYS.indexOf(day));
  if(wasExp)nc.classList.add("expanded");
  card.replaceWith(nc);
  if(wasExp)setTimeout(()=>loadWeatherForDay(day),150);
}

function showModal(title,bodyHtml,onConfirm){
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalBody").innerHTML=bodyHtml;
  modalCb=onConfirm;
  const btn=document.getElementById("mconfirmBtn");
  btn.textContent="Salvează";btn.style.background="var(--amber)";btn.style.color="#000";
  document.getElementById("modalOverlay").classList.add("open");
  setTimeout(()=>{const f=document.querySelector("#modalBody input,#modalBody textarea");if(f)f.focus();},300);
}
function closeMo(){document.getElementById("modalOverlay").classList.remove("open");modalCb=null;}
function closeMoBg(e){if(e.target===document.getElementById("modalOverlay"))closeMo();}
async function confirmMo(){if(modalCb)await modalCb();closeMo();}

function showToast(msg,type=""){
  const t=document.getElementById("toast");t.textContent=msg;t.className="toast show "+type;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
}

function tagClass(tag){
  if(tag.includes("pauză")||tag.includes("cafea"))return"pause";
  if(tag.includes("vizit")||tag.includes("UNESCO")||tag.includes("capital"))return"vizita";
  if(tag.includes("panoram")||tag.includes("alpi")||tag.includes("lac"))return"panorama";
  if(tag.includes("prânz")||tag.includes("gastro")||tag.includes("italian"))return"pranz";
  return"vizita";
}

function showAbout(){
  showModal("ℹ️ Europa 2026",`
    <div style="font-size:13px;color:var(--cream-dim);line-height:1.9">
      <p>➕ <strong style="color:var(--cream)">Adaugă zi</strong> — butonul între zile</p>
      <p>✏️ <strong style="color:var(--cream)">Editează ziua</strong> — dată, localități, km</p>
      <p>🗑️ <strong style="color:var(--cream)">Șterge ziua</strong> — elimină din traseu</p>
      <p>🔄 <strong style="color:var(--cream)">Km automat</strong> — OpenStreetMap gratuit</p>
      <p>🌡️ <strong style="color:var(--cream)">Meteo</strong> — curent + prognoză per oraș</p>
      <p>🏨 <strong style="color:var(--cream)">Cazare</strong> — hotel, adresă, link Booking</p>
      <p>💬 <strong style="color:var(--cream)">Note & Comentarii</strong> — per zi</p>
      <p style="margin-top:12px;color:var(--amber)">🔄 Sincronizare instant Firebase!</p>
    </div>`,()=>{});
  document.getElementById("mconfirmBtn").textContent="OK";
}
</script>
